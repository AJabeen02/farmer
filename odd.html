<!DOCTYPE html>
<html>
<head>
    <title>Sum of Odd numbers</title>
</head>
<body>
<script>
    let numbers = []; 
    let count = 0;
    let sum = 0;
    let limit = prompt("Enter the number of values: ");
    limit = parseInt(limit);
    for (let i = 0; i < limit; i++) { 
        let value = prompt("Enter value " + (i + 1) + ":");
        numbers.push(parseInt(value)); 
    }
    for (let i = 0; i < limit; i++) {
        if (numbers[i] % 2 !== 0) { 
            count = count + 1;
            sum = sum + numbers[i];
        }
    }
    document.write("Odd numbers count: " + count + "<br>");
    document.write("Sum of Odd no: " + sum);
</script>
</body>
</html>
